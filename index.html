<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Audiibly — Live</title>

<!-- HLS.js for M3U8 playback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<style>
  /* ── RESET & BASE ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a0b0f;
    --surface:     #101219;
    --surface-2:   #151824;
    --card:        #12141d;
    --card-hover:  #1a1e2c;
    --border:      #23273a;
    --border-soft: #1a1d2b;

    --gold:        #c9a24b;
    --gold-soft:   #e0bd72;
    --gold-bright: #f2d597;
    --gold-dim:    rgba(201, 162, 75, 0.14);
    --gold-line:   rgba(201, 162, 75, 0.55);

    --violet:      #7c6bb8;
    --violet-dim:  rgba(124, 107, 184, 0.10);

    --live:        #d64545;
    --live-glow:   rgba(214, 69, 69, 0.35);

    --text:        #eef0f4;
    --text-dim:    #b7bbc9;
    --muted:       #6b7086;
    --faint:       #454a5e;

    --radius-lg:   14px;
    --radius-md:   10px;
    --radius-sm:   7px;

    --serif:  'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    --sans:   -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    --mono:   'SF Mono', 'Roboto Mono', Consolas, monospace;

    /* dynamic viewport height with graceful fallback (fixes mobile browser chrome + iframe sizing) */
    --app-height: 100vh;
  }

  html, body {
    height: 100%;
    /* allow scrolling as a safety fallback instead of clipping content
       if the WordPress iframe height ends up shorter than the layout */
    overflow: auto;
  }

  body {
    position: relative;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    isolation: isolate;
    min-height: 100dvh;
  }

  /* slow-drifting ambient light behind everything — the "aureate" glow */
  body::before {
    content: '';
    position: fixed;
    inset: -10%;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 1100px 620px at 18% -8%, rgba(201,162,75,0.09), transparent 58%),
      radial-gradient(ellipse 900px 560px at 104% 12%, var(--violet-dim), transparent 55%),
      radial-gradient(ellipse 700px 500px at 60% 108%, rgba(201,162,75,0.05), transparent 60%),
      var(--bg);
    background-repeat: no-repeat;
    animation: ambientDrift 42s ease-in-out infinite;
  }
  @keyframes ambientDrift {
    0%, 100% { transform: translate3d(0,0,0) scale(1); }
    50%      { transform: translate3d(-1.5%, 1%, 0) scale(1.03); }
  }

  ::selection { background: var(--gold-dim); color: var(--gold-soft); }

  /* ── MAIN LAYOUT ──────────────────────────────────────── */
  .sv-main {
    display: grid;
    grid-template-columns: 85fr 15fr;
    height: 100dvh;
    min-height: 100dvh;
    width: 100%;
  }

  /* when the whole app itself is put into fullscreen mode */
  .sv-main:fullscreen,
  .sv-main:-webkit-full-screen {
    height: 100vh;
    width: 100vw;
    background: var(--bg);
  }

  /* ── PLAYER AREA ──────────────────────────────────────── */
  .sv-player-wrap {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 20px;
    min-width: 0;
    min-height: 0;
  }
  /* ── FRAME WITH SPREAD SHADOW ─────────────────────────────
     A soft, wide drop shadow behind the video box for a
     premium "floating panel" look, without any animation. */
  .sv-video-frame {
    position: relative;
    flex: 1;
    min-height: 0;
    width: 100%;
    border-radius: var(--radius-lg);
    box-shadow:
      0 30px 80px -12px rgba(0,0,0,0.75),
      0 0 90px -10px rgba(201,162,75,0.14),
      0 0 140px -20px rgba(124,107,184,0.10);
  }

  .sv-video-box {
    background: #000;
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    width: 100%;
    height: 100%;
    isolation: isolate;
    box-shadow:
      0 0 0 1px rgba(201,162,75,0.09),
      0 0 0 1.5px var(--border-soft),
      0 1px 0 0 rgba(255,255,255,0.03) inset,
      0 32px 90px -24px rgba(0,0,0,0.8),
      0 12px 32px -10px rgba(0,0,0,0.6),
      0 0 60px -18px rgba(201,162,75,0.06);
    transition: box-shadow 0.4s ease;
  }

  /* fine hairline bezel that sits just inside the shadow ring, like a screen edge */
  .sv-video-box::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    border-radius: inherit;
    border: 1px solid rgba(255,255,255,0.055);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
  }

  /* faint gold corner brackets — premium "framed" cue, fades in on hover */
  .sv-video-box::after {
    content: '';
    position: absolute;
    inset: 10px;
    z-index: 3;
    pointer-events: none;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.5s ease;
    background:
      linear-gradient(var(--gold-line), var(--gold-line)) top left / 18px 1.4px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) top left / 1.4px 18px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) top right / 18px 1.4px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) top right / 1.4px 18px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) bottom left / 18px 1.4px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) bottom left / 1.4px 18px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) bottom right / 18px 1.4px no-repeat,
      linear-gradient(var(--gold-line), var(--gold-line)) bottom right / 1.4px 18px no-repeat;
  }
  .sv-video-box:hover::after {
    opacity: 0.55;
  }

  .sv-video-box video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  /* subtle vignette over the player for a cinematic frame */
  .sv-vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
    box-shadow: inset 0 0 150px 30px rgba(0,0,0,0.42), inset 0 0 2px 0 rgba(0,0,0,0.5);
    background:
      linear-gradient(180deg, rgba(0,0,0,0.22) 0%, transparent 10%, transparent 88%, rgba(0,0,0,0.28) 100%);
  }

  /* ── NOW PLAYING CHIP ─────────────────────────────────── */
  .sv-now-playing {
    position: absolute;
    top: 16px; left: 16px;
    background: linear-gradient(155deg, rgba(16,18,27,0.72), rgba(8,9,13,0.68));
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(201,162,75,0.2);
    border-radius: 13px;
    padding: 9px 16px 9px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    pointer-events: none;
    z-index: 10;
    max-width: calc(100% - 32px);
    box-shadow:
      0 8px 24px -8px rgba(0,0,0,0.55),
      0 1px 0 0 rgba(255,255,255,0.05) inset,
      0 0 0 1px rgba(0,0,0,0.3);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .sv-now-text-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  #sv-now-text {
    font-size: 0.83rem;
    font-weight: 650;
    letter-spacing: 0.005em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  .sv-now-sub {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.63rem;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    white-space: nowrap;
    min-height: 13px;
  }
  .sv-now-hd {
    background: linear-gradient(135deg, var(--gold-dim), rgba(201,162,75,0.22));
    color: var(--gold-bright);
    font-weight: 750;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.58rem;
    letter-spacing: 0.09em;
    border: 1px solid rgba(201,162,75,0.25);
  }
  .sv-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 0 3px rgba(214,69,69,0.14), 0 0 10px var(--live-glow);
    animation: pulse 1.8s infinite;
    flex-shrink: 0;
    margin-top: 4px;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.25); }
  }

  /* ── LOADING / ERROR ──────────────────────────────────── */
  .sv-loading-overlay {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(16,18,27,0.7), rgba(4,5,8,0.88));
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 16px;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    z-index: 8;
    text-align: center;
    padding: 20px;
  }
  .sv-loading-overlay.active { display: flex; }
  .sv-spinner {
    width: 40px; height: 40px;
    position: relative;
  }
  .sv-spinner::before, .sv-spinner::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid transparent;
  }
  .sv-spinner::before {
    border-top-color: var(--gold-soft);
    border-right-color: rgba(201,162,75,0.25);
    animation: spin 0.9s cubic-bezier(0.5,0,0.5,1) infinite;
  }
  .sv-spinner::after {
    inset: 7px;
    border-top-color: var(--gold-dim);
    animation: spin 1.4s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #sv-loading-text {
    font-weight: 500;
  }

  .sv-error {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(20,12,12,0.55), rgba(4,5,8,0.94));
    gap: 9px;
    font-size: 0.88rem;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
    z-index: 9;
  }
  .sv-error.active { display: flex; }
  .sv-error-icon {
    width: 48px; height: 48px;
    border: 1px solid rgba(214,69,69,0.3);
    background: rgba(214,69,69,0.08);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
    color: #e07a7a;
    box-shadow: 0 0 24px -6px rgba(214,69,69,0.25);
  }
  .sv-error-icon svg { width: 21px; height: 21px; }
  .sv-error div:not(.sv-error-icon) { font-weight: 600; color: var(--text); letter-spacing: 0.01em; }
  .sv-error small { color: var(--muted); font-size: 0.78rem; }

  /* ── CUSTOM CONTROLS BAR ──────────────────────────────── */
  .sv-controls-bar {
    position: absolute;
    left: 10px; right: 10px; bottom: 10px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 13px;
    background: linear-gradient(155deg, rgba(18,20,29,0.66), rgba(9,10,15,0.72));
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.075);
    box-shadow:
      0 10px 30px -10px rgba(0,0,0,0.6),
      0 1px 0 0 rgba(255,255,255,0.06) inset,
      0 0 0 1px rgba(0,0,0,0.3);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .sv-ctrl-btn {
    width: 36px; height: 36px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: background 0.22s ease, border-color 0.22s ease, transform 0.15s ease, box-shadow 0.22s ease;
  }
  .sv-ctrl-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(201,162,75,0.35), transparent 70%);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .sv-ctrl-btn:hover {
    background: rgba(201,162,75,0.16);
    border-color: rgba(201,162,75,0.55);
    transform: translateY(-1.5px);
    box-shadow: 0 6px 16px -6px rgba(201,162,75,0.35);
  }
  .sv-ctrl-btn:hover::before { opacity: 1; }
  .sv-ctrl-btn:active { transform: translateY(0); }
  .sv-ctrl-btn svg { width: 16px; height: 16px; fill: #fff; position: relative; z-index: 1; }

  .sv-volume-group {
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .sv-volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(90deg, var(--gold-soft) var(--vol-pct, 100%), rgba(255,255,255,0.15) var(--vol-pct, 100%));
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sv-volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--gold-bright);
    box-shadow: 0 0 0 3px rgba(201,162,75,0.18), 0 1px 4px rgba(0,0,0,0.5);
    cursor: pointer;
    margin-top: -4px;
    transition: transform 0.15s ease;
  }
  .sv-volume-slider:hover::-webkit-slider-thumb { transform: scale(1.15); }
  .sv-volume-slider::-moz-range-thumb {
    width: 12px; height: 12px;
    border: none;
    border-radius: 50%;
    background: var(--gold-bright);
    box-shadow: 0 0 0 3px rgba(201,162,75,0.18), 0 1px 4px rgba(0,0,0,0.5);
    cursor: pointer;
  }
  .sv-volume-slider::-webkit-slider-runnable-track { height: 4px; border-radius: 4px; }
  .sv-volume-slider::-moz-range-track { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); }

  .sv-ctrl-spacer { flex: 1; }

  .sv-ctrl-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.1);
    flex-shrink: 0;
  }

  /* auto-hide chrome when idle, in both windowed and fullscreen */
  .sv-video-box.sv-idle .sv-controls-bar,
  .sv-video-box.sv-idle .sv-now-playing {
    opacity: 0;
    pointer-events: none;
  }
.sv-video-box:not(:fullscreen).sv-idle:hover .sv-controls-bar,
.sv-video-box:not(:fullscreen).sv-idle:hover .sv-now-playing {
  opacity: 1;
  pointer-events: auto;
}
  .sv-video-box:fullscreen.sv-idle { cursor: none; }

  /* ── SIDEBAR / CHANNEL LIST ───────────────────────────── */
  .sv-sidebar {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    padding: 20px 20px 20px 0;
    border-left: 1px solid var(--border-soft);
    background: rgba(16, 18, 25, 0.4);
  }
  .sv-sidebar-inner {
    padding-left: 18px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }
  .sv-sidebar-top {
    display: flex;
    justify-content: flex-end;
    flex-shrink: 0;
    margin-bottom: 14px;
  }
  .sv-brand-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(201,162,75,0.16), rgba(201,162,75,0.06));
    border: 1px solid rgba(201,162,75,0.35);
    color: var(--gold-soft);
    font-family: var(--serif);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, color 0.2s ease;
  }
  .sv-brand-btn svg {
    width: 12px; height: 12px;
    flex-shrink: 0;
    opacity: 0.75;
    transition: transform 0.2s ease, opacity 0.2s ease;
  }
  .sv-brand-btn:hover {
    background: linear-gradient(135deg, rgba(201,162,75,0.28), rgba(201,162,75,0.1));
    border-color: var(--gold);
    color: var(--gold-bright);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px -8px rgba(201,162,75,0.4);
  }
  .sv-brand-btn:hover svg {
    transform: translate(1px, -1px);
    opacity: 1;
  }
  .sv-brand-btn:active { transform: translateY(0); }

  .sv-sidebar-header {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sv-count {
    color: var(--faint);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .sv-search-wrap {
    position: relative;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .sv-search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    fill: none;
    stroke: var(--muted);
    stroke-width: 2;
    pointer-events: none;
  }
  .sv-search {
    width: 100%;
    background: rgba(18, 20, 29, 0.7);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px 10px 34px;
    color: var(--text);
    font-size: 0.85rem;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .sv-search:focus {
    border-color: var(--gold);
    background: var(--card-hover);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .sv-search::placeholder { color: var(--faint); }

  .sv-channel-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
  }
  .sv-channel-list::-webkit-scrollbar { width: 4px; }
  .sv-channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sv-channel-list::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  .sv-channel-list::-webkit-scrollbar-track { background: transparent; }

  @keyframes chFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sv-ch-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: var(--sans);
    position: relative;
    animation: chFadeIn 0.4s ease backwards;
    animation-delay: calc(var(--i, 0) * 28ms);
  }
  .sv-ch-btn:hover {
    background: var(--card-hover);
    border-color: #313650;
    transform: translateX(2px);
  }
  .sv-ch-btn.active {
    background: linear-gradient(90deg, var(--gold-dim), rgba(201,162,75,0.03));
    border-color: rgba(201,162,75,0.45);
    box-shadow: 0 4px 18px -8px rgba(201,162,75,0.25);
  }
  .sv-ch-btn.active::before {
    content: '';
    position: absolute;
    left: -1px; top: 8px; bottom: 8px;
    width: 3px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(201,162,75,0.55);
  }
  .sv-ch-logo {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    overflow: hidden;
    border: 1px solid var(--border-soft);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .sv-ch-btn.active .sv-ch-logo {
    border-color: rgba(201,162,75,0.5);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .sv-ch-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .sv-ch-info { flex: 1; min-width: 0; }
  .sv-ch-title {
    font-size: 0.84rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sv-ch-btn.active .sv-ch-title { color: var(--gold-soft); }
  .sv-ch-cat {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }
  .sv-ch-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--faint);
    flex-shrink: 0;
  }
  .sv-ch-btn.active .sv-ch-live {
    background: var(--live);
    box-shadow: 0 0 6px var(--live-glow);
  }

  .sv-empty {
    color: var(--faint);
    text-align: center;
    padding: 30px 10px;
    font-size: 0.85rem;
  }

  /* ── FULLSCREEN MODE ───────────────────────────────────── */
  .sv-video-box:fullscreen {
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sv-video-box:fullscreen video {
    max-height: 100vh;
  }
  .sv-video-box:-webkit-full-screen {
    border-radius: 0;
  }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 900px) {
    html, body { overflow: auto; }
    .sv-main {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100dvh;
    }
    .sv-player-wrap {
      height: auto;
    }
    .sv-video-frame {
      aspect-ratio: 16/9;
      flex: none;
    }
    .sv-video-box {
      height: auto;
      aspect-ratio: 16/9;
    }
    .sv-sidebar {
      height: auto;
      border-left: none;
      border-top: 1px solid var(--border-soft);
      padding: 20px;
    }
    .sv-sidebar-inner {
      padding-left: 0;
    }
    .sv-channel-list {
      max-height: 400px;
      flex: none;
    }
  }

  @media (max-width: 500px) {
    .sv-player-wrap { padding: 12px; }
    .sv-sidebar { padding: 16px; }
    .sv-volume-slider { width: 52px; }
  }

  /* focus visibility for accessibility */
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- MAIN -->
<div class="sv-main" id="sv-main">

  <!-- PLAYER -->
  <div class="sv-player-wrap">

    <div class="sv-video-frame">
      <div class="sv-video-box" id="sv-video-box">
      <video id="sv-video" playsinline webkit-playsinline x5-playsinline autoplay></video>
      <div class="sv-vignette"></div>

      <div class="sv-now-playing" id="sv-now-playing">
        <span class="sv-dot"></span>
        <div class="sv-now-text-group">
          <span id="sv-now-text">Select a channel</span>
          <span class="sv-now-sub" id="sv-now-sub"></span>
        </div>
      </div>

      <div class="sv-loading-overlay" id="sv-loading">
        <div class="sv-spinner"></div>
        <span id="sv-loading-text">Loading stream…</span>
      </div>

      <div class="sv-error" id="sv-error">
        <div class="sv-error-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
        </div>
        <div>Stream unavailable</div>
        <small>Check the URL or try another channel</small>
      </div>

      <div class="sv-controls-bar" id="sv-controls-bar">
        <button class="sv-ctrl-btn" id="sv-play-btn" title="Play / Pause (Space)" aria-label="Play or pause" onclick="togglePlay()">
          <svg id="sv-play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="sv-volume-group">
          <button class="sv-ctrl-btn" id="sv-mute-btn" title="Mute (M)" aria-label="Mute or unmute" onclick="toggleMute()">
            <svg id="sv-mute-icon" viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/><path d="M14 4.45v2.06c2.89.86 5 3.54 5 6.49s-2.11 5.63-5 6.49v2.06c4.01-.91 7-4.49 7-8.55s-2.99-7.64-7-8.55z"/></svg>
          </button>
          <input type="range" class="sv-volume-slider" id="sv-volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume">
        </div>

        <div class="sv-ctrl-spacer"></div>
        <div class="sv-ctrl-divider"></div>

        <button class="sv-ctrl-btn" id="sv-fs-btn" title="Fullscreen (F)" aria-label="Toggle fullscreen" onclick="toggleFullscreen()">
          <svg id="sv-fs-icon" viewBox="0 0 24 24"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
        </button>
      </div>
      </div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="sv-sidebar">
    <div class="sv-sidebar-inner">
      <div class="sv-sidebar-top">
        <a class="sv-brand-btn" href="https://audiibly.com" target="_blank" rel="noopener noreferrer">
          Audiibly
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"/><path d="M8 7h9v9"/></svg>
        </a>
      </div>
      <div class="sv-sidebar-header">
        <span>Channels</span>
        <span class="sv-count" id="sv-count"></span>
      </div>
      <div class="sv-search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="sv-search" type="text" placeholder="Search channels…" id="sv-search" oninput="filterChannels(this.value)">
      </div>
      <div class="sv-channel-list" id="sv-channel-list"></div>
    </div>
  </div>

</div>

<script>
  let CHANNELS = [];
  let hls = null;
  let activeIdx = -1;

  const video = document.getElementById('sv-video');
  const loadDiv = document.getElementById('sv-loading');
  const loadingText = document.getElementById('sv-loading-text');
  const errDiv = document.getElementById('sv-error');
  const nowText = document.getElementById('sv-now-text');
  const nowSub = document.getElementById('sv-now-sub');
  const countEl = document.getElementById('sv-count');

  /* ── DYNAMIC VIEWPORT HEIGHT FIX (mobile browser chrome + iframe) ──
     Sets a --app-height custom property to the real visible height,
     recalculated on resize/orientation change. This makes the layout
     adapt correctly no matter what height the WordPress iframe ends
     up rendering at, on any device. */
  function setAppHeight() {
    const h = window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', setAppHeight);

  function showLoading(on) {
    loadDiv.classList.toggle('active', on);
  }

  function showError(on) {
    errDiv.classList.toggle('active', on);
  }

  async function loadChannelsFromJson() {
    try {
      const response = await fetch('channels.json');

      if (!response.ok) {
        throw new Error('Failed to load channels');
      }

      CHANNELS = await response.json();

      renderChannels(CHANNELS);

      if (CHANNELS.length > 0) {
        loadChannel(0);
      }

    } catch (error) {
      console.error(error);
      document.getElementById('sv-channel-list').innerHTML =
        '<div class="sv-empty">Couldn\'t load the channel list.</div>';
    }
  }

  function loadChannel(idx) {

    const ch = CHANNELS[idx];
    if (!ch) return;

    activeIdx = idx;

    nowText.textContent = ch.name;
    nowSub.innerHTML = `${ch.category} <span class="sv-now-hd">HD</span>`;
    loadingText.textContent = `Loading ${ch.name}…`;
    document.title = `${ch.name} — Audiibly Live`;

    document.querySelectorAll('.sv-ch-btn').forEach((btn) => {
      btn.classList.toggle('active', Number(btn.dataset.idx) === idx);
    });

    showLoading(true);
    showError(false);
    clearTimeout(idleTimer);
    videoBox.classList.remove('sv-idle');

    if (hls) {
      hls.destroy();
      hls = null;
    }

    video.src = '';

    if (Hls.isSupported()) {

      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true
      });

      hls.loadSource(ch.url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        showLoading(false);
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.ERROR, (_, data) => {

        if (data.fatal) {
          showLoading(false);
          showError(true);
        }

      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

      video.src = ch.url;

      video.addEventListener(
        'loadedmetadata',
        () => {
          showLoading(false);
          video.play().catch(() => {});
        },
        { once: true }
      );

      video.addEventListener(
        'error',
        () => {
          showLoading(false);
          showError(true);
        },
        { once: true }
      );

    } else {

      showLoading(false);
      showError(true);

    }
  }

  function renderChannels(list) {

    const container = document.getElementById('sv-channel-list');

    container.innerHTML = '';
    countEl.textContent = CHANNELS.length ? `${list.length} / ${CHANNELS.length}` : '';

    if (list.length === 0) {
      container.innerHTML = '<div class="sv-empty">No channels match your search.</div>';
      return;
    }

    list.forEach((ch, i) => {

      const realIdx = CHANNELS.indexOf(ch);

      const btn = document.createElement('button');

      btn.className = 'sv-ch-btn' + (realIdx === activeIdx ? ' active' : '');
      btn.dataset.idx = realIdx;
      btn.style.setProperty('--i', i);

      const isImgUrl =
        ch.logo &&
        (ch.logo.startsWith('http') || ch.logo.startsWith('/'));

      const logoContent = isImgUrl
        ? `<img src="${ch.logo}" alt="${ch.name}" loading="lazy">`
        : (ch.logo || ch.name.charAt(0));

      btn.innerHTML = `
        <div class="sv-ch-logo">${logoContent}</div>

        <div class="sv-ch-info">
          <div class="sv-ch-title">${ch.name}</div>
          <div class="sv-ch-cat">${ch.category}</div>
        </div>

        <div class="sv-ch-live"></div>
      `;

      btn.addEventListener('click', () => {
        loadChannel(realIdx);
      });

      container.appendChild(btn);

    });
  }

  function filterChannels(query) {

    const q = query.toLowerCase().trim();

    const filtered = q
      ? CHANNELS.filter(
          c =>
            c.name.toLowerCase().includes(q) ||
            c.category.toLowerCase().includes(q)
        )
      : CHANNELS;

    renderChannels(filtered);
  }

  /* ── PLAY / MUTE CONTROLS ──────────────────────────────── */
  const playIcon = document.getElementById('sv-play-icon');
  const muteIcon = document.getElementById('sv-mute-icon');
  const volumeSlider = document.getElementById('sv-volume-slider');

  const ICON_PLAY  = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  const ICON_SOUND = '<path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/><path d="M14 4.45v2.06c2.89.86 5 3.54 5 6.49s-2.11 5.63-5 6.49v2.06c4.01-.91 7-4.49 7-8.55s-2.99-7.64-7-8.55z"/>';
  const ICON_MUTED = '<path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M19 9l-4.5 4.5M14.5 9l4.5 4.5" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>';

  function togglePlay() {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  }

  function toggleMute() {
    video.muted = !video.muted;
    if (!video.muted && video.volume === 0) {
      video.volume = 0.6;
      volumeSlider.value = 0.6;
    }
    updateMuteIcon();
  }

  function updateMuteIcon() {
    const silent = video.muted || video.volume === 0;
    muteIcon.innerHTML = silent ? ICON_MUTED : ICON_SOUND;
  }

  video.addEventListener('play', () => { playIcon.innerHTML = ICON_PAUSE; armIdle(); });
  video.addEventListener('pause', () => {
    playIcon.innerHTML = ICON_PLAY;
    clearTimeout(idleTimer);
    videoBox.classList.remove('sv-idle');
  });
  video.addEventListener('volumechange', updateMuteIcon);

  function updateVolumeFill() {
    volumeSlider.style.setProperty('--vol-pct', `${Number(volumeSlider.value) * 100}%`);
  }

  volumeSlider.addEventListener('input', () => {
    video.volume = Number(volumeSlider.value);
    video.muted = false;
    updateMuteIcon();
    updateVolumeFill();
  });

  updateVolumeFill();

  /* ── FULLSCREEN ─────────────────────────────────────────── */
  const videoBox = document.getElementById('sv-video-box');
  const svMain = document.getElementById('sv-main');
  const fsIcon = document.getElementById('sv-fs-icon');

  const ICON_FS_ENTER =
    '<path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>';
  const ICON_FS_EXIT =
    '<path d="M5 16H3v5h5v-2H5v-3zm-2-8h2V5h3V3H3v5zm13 11h3v-3h2v-5h-5v5h-2v3zm3-11V5h-3V3h5v5h-2z"/>';

  function isFullscreenSupported(el) {
    return !!(el.requestFullscreen || el.webkitRequestFullscreen);
  }

  function toggleFullscreen() {

    const alreadyFs = !!(document.fullscreenElement || document.webkitFullscreenElement);

    if (!alreadyFs) {

      // Fullscreen the video box (player only). If that fails (e.g. some
      // in-iframe restrictions), fall back to fullscreening the whole app
      // so the person still gets a true fullscreen experience.
      const target = videoBox;

      const request = target.requestFullscreen || target.webkitRequestFullscreen;

      if (request) {
        request.call(target).catch?.(() => {
          const fallback = svMain.requestFullscreen || svMain.webkitRequestFullscreen;
          fallback?.call(svMain);
        });

        // Some browsers (older WebKit) don't return a promise, so also
        // guard with a short timeout fallback check.
        if (!(request.call.length)) {
          // no-op, promise path already attempted above
        }
      } else {
        const fallback = svMain.requestFullscreen || svMain.webkitRequestFullscreen;
        fallback?.call(svMain);
      }

    } else {

      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);

    }
  }

  function onFsChange() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsIcon.innerHTML = isFs ? ICON_FS_EXIT : ICON_FS_ENTER;
    armIdle();
  }

  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);

  /* ── IDLE / AUTO-HIDE CHROME ───────────────────────────── */
  let idleTimer = null;

  function armIdle() {
    clearTimeout(idleTimer);
    videoBox.classList.remove('sv-idle');
    if (!video.paused) {
      idleTimer = setTimeout(() => videoBox.classList.add('sv-idle'), 2800);
    }
  }

  videoBox.addEventListener('mousemove', armIdle);
  videoBox.addEventListener('touchstart', armIdle, { passive: true });

  document.addEventListener('keydown', e => {

    if (e.target.tagName === 'INPUT') return;

    const key = e.key.toLowerCase();

    if (key === 'f') {
      toggleFullscreen();
    } else if (key === 'm') {
      toggleMute();
    } else if (e.key === ' ') {
      e.preventDefault();
      togglePlay();
    }

  });

  /* Initialize */
  loadChannelsFromJson();
</script>
</body>
</html>
