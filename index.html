<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurel — Live</title>

<!-- HLS.js for M3U8 playback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<style>
  /* ── RESET & BASE ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a0b0f;
    --surface:     #101219;
    --surface-2:   #151824;
    --card:        #12141d;
    --card-hover:  #1a1e2c;
    --border:      #23273a;
    --border-soft: #1a1d2b;

    --gold:        #c9a24b;
    --gold-soft:   #e0bd72;
    --gold-dim:    rgba(201, 162, 75, 0.14);

    --live:        #d64545;
    --live-glow:   rgba(214, 69, 69, 0.35);

    --text:        #eef0f4;
    --text-dim:    #b7bbc9;
    --muted:       #6b7086;
    --faint:       #454a5e;

    --radius-lg:   14px;
    --radius-md:   10px;
    --radius-sm:   7px;

    --serif:  'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    --sans:   -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    --mono:   'SF Mono', 'Roboto Mono', Consolas, monospace;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background:
      radial-gradient(ellipse 1200px 600px at 20% -10%, rgba(201,162,75,0.06), transparent 60%),
      radial-gradient(ellipse 900px 500px at 100% 10%, rgba(80,60,120,0.05), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  ::selection { background: var(--gold-dim); color: var(--gold-soft); }

  /* ── MAIN LAYOUT ──────────────────────────────────────── */
  .sv-main {
    display: grid;
    grid-template-columns: 85fr 15fr;
    height: 100vh;
    width: 100vw;
  }

  /* ── PLAYER AREA ──────────────────────────────────────── */
  .sv-player-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px;
    min-width: 0;
  }
  .sv-video-box {
    background: #000;
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 0;
    box-shadow:
      0 0 0 1px var(--border-soft),
      0 20px 60px -20px rgba(0,0,0,0.7),
      0 8px 24px -8px rgba(0,0,0,0.5);
  }
  .sv-video-box video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  /* subtle vignette over the player for a cinematic frame */
  .sv-vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 120px 20px rgba(0,0,0,0.35);
    z-index: 2;
  }

  /* ── FULLSCREEN / CONTROLS ────────────────────────────── */
  .sv-fs-btn {
    position: absolute;
    bottom: 14px; right: 14px;
    background: rgba(10, 11, 15, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    padding: 8px 13px;
    display: flex; align-items: center; gap: 7px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-family: var(--sans);
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    z-index: 10;
  }
  .sv-fs-btn:hover { background: rgba(201,162,75,0.18); border-color: var(--gold); transform: translateY(-1px); }
  .sv-fs-btn:active { transform: translateY(0); }
  .sv-fs-btn svg { width: 14px; height: 14px; fill: #fff; }

  .sv-now-playing {
    position: absolute;
    top: 14px; left: 14px;
    background: rgba(10, 11, 15, 0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px 12px 6px 10px;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 7px;
    pointer-events: none;
    z-index: 10;
    max-width: calc(100% - 28px);
  }
  #sv-now-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sv-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 8px var(--live-glow);
    animation: pulse 1.8s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.25); }
  }

  .sv-loading-overlay {
    position: absolute; inset: 0;
    background: rgba(6, 7, 10, 0.72);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    z-index: 8;
  }
  .sv-loading-overlay.active { display: flex; }
  .sv-spinner {
    width: 34px; height: 34px;
    border: 2.5px solid rgba(201,162,75,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sv-error {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(6, 7, 10, 0.92);
    gap: 8px;
    font-size: 0.88rem;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
    z-index: 9;
  }
  .sv-error.active { display: flex; }
  .sv-error-icon {
    width: 44px; height: 44px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 6px;
    color: var(--faint);
  }
  .sv-error-icon svg { width: 20px; height: 20px; }
  .sv-error small { color: var(--muted); font-size: 0.78rem; }

  /* ── CHANNEL INFO BAR ─────────────────────────────────── */
  .sv-info-bar {
    margin-top: 16px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-lg);
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .sv-channel-name {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .sv-channel-meta {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .sv-quality-badge {
    font-size: 0.68rem;
    font-weight: 700;
    background: var(--gold-dim);
    color: var(--gold-soft);
    padding: 5px 11px;
    border-radius: 5px;
    letter-spacing: 0.1em;
  }

  /* ── SIDEBAR / CHANNEL LIST ───────────────────────────── */
  .sv-sidebar {
    height: 100vh;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 20px 20px 20px 0;
    border-left: 1px solid var(--border-soft);
    background: rgba(16, 18, 25, 0.4);
  }
  .sv-sidebar-inner {
    padding-left: 18px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }
  .sv-sidebar-header {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sv-count {
    color: var(--faint);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .sv-search-wrap {
    position: relative;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .sv-search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    fill: none;
    stroke: var(--muted);
    stroke-width: 2;
    pointer-events: none;
  }
  .sv-search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px 10px 34px;
    color: var(--text);
    font-size: 0.85rem;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .sv-search:focus { border-color: var(--gold); background: var(--card-hover); }
  .sv-search::placeholder { color: var(--faint); }

  .sv-channel-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
  }
  .sv-channel-list::-webkit-scrollbar { width: 4px; }
  .sv-channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sv-channel-list::-webkit-scrollbar-track { background: transparent; }

  .sv-ch-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: var(--sans);
    position: relative;
  }
  .sv-ch-btn:hover { background: var(--card-hover); border-color: #313650; }
  .sv-ch-btn.active {
    background: var(--gold-dim);
    border-color: rgba(201,162,75,0.45);
  }
  .sv-ch-btn.active::before {
    content: '';
    position: absolute;
    left: -1px; top: 8px; bottom: 8px;
    width: 3px;
    background: var(--gold);
    border-radius: 3px;
  }
  .sv-ch-logo {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    overflow: hidden;
    border: 1px solid var(--border-soft);
  }
  .sv-ch-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .sv-ch-info { flex: 1; min-width: 0; }
  .sv-ch-title {
    font-size: 0.84rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sv-ch-btn.active .sv-ch-title { color: var(--gold-soft); }
  .sv-ch-cat {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }
  .sv-ch-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--faint);
    flex-shrink: 0;
  }
  .sv-ch-btn.active .sv-ch-live {
    background: var(--live);
    box-shadow: 0 0 6px var(--live-glow);
  }

  .sv-empty {
    color: var(--faint);
    text-align: center;
    padding: 30px 10px;
    font-size: 0.85rem;
  }

  /* ── THEATER / FULLSCREEN MODE ────────────────────────── */
  .sv-video-box:fullscreen {
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sv-video-box:fullscreen video {
    max-height: 100vh;
  }
  .sv-video-box:-webkit-full-screen {
    border-radius: 0;
  }

  /* auto-hide chrome in fullscreen when idle */
  .sv-video-box.sv-theater .sv-fs-btn,
  .sv-video-box.sv-theater .sv-now-playing {
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .sv-video-box.sv-theater:hover .sv-fs-btn,
  .sv-video-box.sv-theater:hover .sv-now-playing,
  .sv-video-box.sv-theater.sv-show-chrome .sv-fs-btn,
  .sv-video-box.sv-theater.sv-show-chrome .sv-now-playing {
    opacity: 1;
  }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 900px) {
    html, body { overflow: auto; }
    .sv-main {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }
    .sv-player-wrap {
      height: auto;
    }
    .sv-video-box {
      aspect-ratio: 16/9;
      flex: none;
    }
    .sv-sidebar {
      height: auto;
      border-left: none;
      border-top: 1px solid var(--border-soft);
      padding: 20px;
    }
    .sv-sidebar-inner {
      padding-left: 0;
    }
    .sv-channel-list {
      max-height: 400px;
      flex: none;
    }
  }

  @media (max-width: 500px) {
    .sv-player-wrap { padding: 12px; }
    .sv-info-bar { padding: 14px 16px; }
    .sv-channel-name { font-size: 1.05rem; }
    .sv-sidebar { padding: 16px; }
  }

  /* focus visibility for accessibility */
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- MAIN -->
<div class="sv-main">

  <!-- PLAYER -->
  <div class="sv-player-wrap">
    <div class="sv-video-box" id="sv-video-box">
      <video id="sv-video" controls playsinline autoplay webkit-playsinline x5-playsinline></video>
      <div class="sv-vignette"></div>

      <button class="sv-fs-btn" id="sv-fs-btn" title="Fullscreen (F)" onclick="toggleFullscreen()">
        <svg id="sv-fs-icon" viewBox="0 0 24 24"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
        <span id="sv-fs-label">Fullscreen</span>
      </button>

      <div class="sv-now-playing" id="sv-now-playing">
        <span class="sv-dot"></span>
        <span id="sv-now-text">Select a channel</span>
      </div>

      <div class="sv-loading-overlay" id="sv-loading">
        <div class="sv-spinner"></div>
        <span>Loading stream…</span>
      </div>

      <div class="sv-error" id="sv-error">
        <div class="sv-error-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
        </div>
        <div>Stream unavailable</div>
        <small>Check the URL or try another channel</small>
      </div>
    </div>

    <div class="sv-info-bar">
      <div>
        <div class="sv-channel-name" id="sv-ch-name">— No Channel Selected —</div>
        <div class="sv-channel-meta" id="sv-ch-meta">Choose a channel from the list</div>
      </div>
      <span class="sv-quality-badge">HD</span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sv-sidebar">
    <div class="sv-sidebar-inner">
      <div class="sv-sidebar-header">
        <span>Channels</span>
        <span class="sv-count" id="sv-count"></span>
      </div>
      <div class="sv-search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="sv-search" type="text" placeholder="Search channels…" id="sv-search" oninput="filterChannels(this.value)">
      </div>
      <div class="sv-channel-list" id="sv-channel-list"></div>
    </div>
  </div>

</div>

<script>
  let CHANNELS = [];
  let hls = null;
  let activeIdx = -1;

  const video = document.getElementById('sv-video');
  const loadDiv = document.getElementById('sv-loading');
  const errDiv = document.getElementById('sv-error');
  const nowText = document.getElementById('sv-now-text');
  const chName = document.getElementById('sv-ch-name');
  const chMeta = document.getElementById('sv-ch-meta');
  const countEl = document.getElementById('sv-count');

  function showLoading(on) {
    loadDiv.classList.toggle('active', on);
  }

  function showError(on) {
    errDiv.classList.toggle('active', on);
  }

  async function loadChannelsFromJson() {
    try {
      const response = await fetch('channels.json');

      if (!response.ok) {
        throw new Error('Failed to load channels');
      }

      CHANNELS = await response.json();

      renderChannels(CHANNELS);

      if (CHANNELS.length > 0) {
        loadChannel(0);
      }

    } catch (error) {
      console.error(error);
      document.getElementById('sv-channel-list').innerHTML =
        '<div class="sv-empty">Couldn\'t load the channel list.</div>';
    }
  }

  function loadChannel(idx) {

    const ch = CHANNELS[idx];
    if (!ch) return;

    activeIdx = idx;

    nowText.textContent = ch.name;
    chName.textContent = ch.name;
    chMeta.textContent = `${ch.category} · Live`;

    document.querySelectorAll('.sv-ch-btn').forEach((btn) => {
      btn.classList.toggle('active', Number(btn.dataset.idx) === idx);
    });

    showLoading(true);
    showError(false);

    if (hls) {
      hls.destroy();
      hls = null;
    }

    video.src = '';

    if (Hls.isSupported()) {

      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true
      });

      hls.loadSource(ch.url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        showLoading(false);
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.ERROR, (_, data) => {

        if (data.fatal) {
          showLoading(false);
          showError(true);
        }

      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

      video.src = ch.url;

      video.addEventListener(
        'loadedmetadata',
        () => {
          showLoading(false);
          video.play().catch(() => {});
        },
        { once: true }
      );

      video.addEventListener(
        'error',
        () => {
          showLoading(false);
          showError(true);
        },
        { once: true }
      );

    } else {

      showLoading(false);
      showError(true);

    }
  }

  function renderChannels(list) {

    const container = document.getElementById('sv-channel-list');

    container.innerHTML = '';
    countEl.textContent = CHANNELS.length ? `${list.length} / ${CHANNELS.length}` : '';

    if (list.length === 0) {
      container.innerHTML = '<div class="sv-empty">No channels match your search.</div>';
      return;
    }

    list.forEach((ch) => {

      const realIdx = CHANNELS.indexOf(ch);

      const btn = document.createElement('button');

      btn.className = 'sv-ch-btn' + (realIdx === activeIdx ? ' active' : '');
      btn.dataset.idx = realIdx;

      const isImgUrl =
        ch.logo &&
        (ch.logo.startsWith('http') || ch.logo.startsWith('/'));

      const logoContent = isImgUrl
        ? `<img src="${ch.logo}" alt="${ch.name}" loading="lazy">`
        : (ch.logo || ch.name.charAt(0));

      btn.innerHTML = `
        <div class="sv-ch-logo">${logoContent}</div>

        <div class="sv-ch-info">
          <div class="sv-ch-title">${ch.name}</div>
          <div class="sv-ch-cat">${ch.category}</div>
        </div>

        <div class="sv-ch-live"></div>
      `;

      btn.addEventListener('click', () => {
        loadChannel(realIdx);
      });

      container.appendChild(btn);

    });
  }

  function filterChannels(query) {

    const q = query.toLowerCase().trim();

    const filtered = q
      ? CHANNELS.filter(
          c =>
            c.name.toLowerCase().includes(q) ||
            c.category.toLowerCase().includes(q)
        )
      : CHANNELS;

    renderChannels(filtered);
  }

  /* ── FULLSCREEN / THEATER MODE ──────────────────────────── */
  const videoBox = document.getElementById('sv-video-box');
  const fsIcon = document.getElementById('sv-fs-icon');
  const fsLabel = document.getElementById('sv-fs-label');

  const ICON_ENTER =
    '<path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>';

  const ICON_EXIT =
    '<path d="M5 16H3v5h5v-2H5v-3zm-2-8h2V5h3V3H3v5zm13 11h3v-3h2v-5h-5v5h-2v3zm3-11V5h-3V3h5v5h-2z"/>';

  function toggleFullscreen() {

    const el = videoBox;

    if (!document.fullscreenElement && !document.webkitFullscreenElement) {

      (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);

    } else {

      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);

    }
  }

  let hideChromeTimer = null;

  function onFsChange() {

    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);

    fsIcon.innerHTML = isFs ? ICON_EXIT : ICON_ENTER;
    fsLabel.textContent = isFs ? 'Exit' : 'Fullscreen';

    videoBox.classList.toggle('sv-theater', isFs);

    if (isFs) {
      armChromeAutoHide();
    } else {
      clearTimeout(hideChromeTimer);
      videoBox.classList.remove('sv-show-chrome');
    }
  }

  function armChromeAutoHide() {
    videoBox.classList.add('sv-show-chrome');
    clearTimeout(hideChromeTimer);
    hideChromeTimer = setTimeout(() => {
      videoBox.classList.remove('sv-show-chrome');
    }, 2600);
  }

  videoBox.addEventListener('mousemove', () => {
    if (videoBox.classList.contains('sv-theater')) armChromeAutoHide();
  });
  videoBox.addEventListener('touchstart', () => {
    if (videoBox.classList.contains('sv-theater')) armChromeAutoHide();
  }, { passive: true });

  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);

  document.addEventListener('keydown', e => {

    if (e.target.tagName === 'INPUT') return;

    if (e.key.toLowerCase() === 'f') {
      toggleFullscreen();
    }

  });

  /* Initialize */
  loadChannelsFromJson();
</script>
