<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Aurel — Live</title>

<!-- HLS.js for M3U8 playback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>

<style>
  /* ── RESET & BASE ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #0a0b0f;
    --surface:     #101219;
    --surface-2:   #151824;
    --card:        #12141d;
    --card-hover:  #1a1e2c;
    --border:      #23273a;
    --border-soft: #1a1d2b;

    --gold:        #c9a24b;
    --gold-soft:   #e0bd72;
    --gold-bright: #f2d597;
    --gold-dim:    rgba(201, 162, 75, 0.14);
    --gold-line:   rgba(201, 162, 75, 0.55);

    --violet:      #7c6bb8;
    --violet-dim:  rgba(124, 107, 184, 0.10);

    --live:        #d64545;
    --live-glow:   rgba(214, 69, 69, 0.35);

    --text:        #eef0f4;
    --text-dim:    #b7bbc9;
    --muted:       #6b7086;
    --faint:       #454a5e;

    --radius-lg:   14px;
    --radius-md:   10px;
    --radius-sm:   7px;

    --serif:  'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, 'Times New Roman', serif;
    --sans:   -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
    --mono:   'SF Mono', 'Roboto Mono', Consolas, monospace;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    position: relative;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    isolation: isolate;
  }

  /* slow-drifting ambient light behind everything — the "aureate" glow */
  body::before {
    content: '';
    position: fixed;
    inset: -10%;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 1100px 620px at 18% -8%, rgba(201,162,75,0.09), transparent 58%),
      radial-gradient(ellipse 900px 560px at 104% 12%, var(--violet-dim), transparent 55%),
      radial-gradient(ellipse 700px 500px at 60% 108%, rgba(201,162,75,0.05), transparent 60%),
      var(--bg);
    background-repeat: no-repeat;
    animation: ambientDrift 42s ease-in-out infinite;
  }
  @keyframes ambientDrift {
    0%, 100% { transform: translate3d(0,0,0) scale(1); }
    50%      { transform: translate3d(-1.5%, 1%, 0) scale(1.03); }
  }

  ::selection { background: var(--gold-dim); color: var(--gold-soft); }

  /* ── MAIN LAYOUT ──────────────────────────────────────── */
  .sv-main {
    display: grid;
    grid-template-columns: 85fr 15fr;
    height: 100vh;
    width: 100vw;
  }

  /* ── BRAND HEADER ─────────────────────────────────────── */
  .sv-brand-header {
    flex-shrink: 0;
    padding-bottom: 14px;
    margin-bottom: 16px;
  }
  .sv-brand-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .sv-brand-word {
    font-family: var(--serif);
    font-size: 1.28rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    background: linear-gradient(115deg, var(--gold-soft), var(--gold-bright) 40%, var(--gold) 75%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sv-brand-tagline {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    font-style: italic;
    font-family: var(--serif);
  }
  .sv-brand-shimmer {
    margin-top: 10px;
    height: 1px;
    background: linear-gradient(
      90deg,
      var(--gold-line) 0%,
      rgba(201,162,75,0.05) 18%,
      rgba(201,162,75,0.05) 82%,
      var(--gold-line) 100%
    );
    position: relative;
    overflow: hidden;
  }
  .sv-brand-shimmer::after {
    content: '';
    position: absolute;
    top: 0; left: -30%;
    width: 30%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
    animation: shimmerSweep 5.5s ease-in-out infinite;
  }
  @keyframes shimmerSweep {
    0%   { left: -30%; opacity: 0; }
    10%  { opacity: 1; }
    50%  { left: 100%; opacity: 1; }
    60%  { opacity: 0; }
    100% { left: 100%; opacity: 0; }
  }

  /* ── PLAYER AREA ──────────────────────────────────────── */
  .sv-player-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 20px;
    min-width: 0;
  }
  .sv-video-box {
    background: #000;
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 0;
    box-shadow:
      0 0 0 1px var(--border-soft),
      0 0 0 1px rgba(201,162,75,0.05) inset,
      0 24px 70px -20px rgba(0,0,0,0.75),
      0 8px 24px -8px rgba(0,0,0,0.55);
  }
  .sv-video-box video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    background: #000;
  }

  /* subtle vignette over the player for a cinematic frame */
  .sv-vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 130px 24px rgba(0,0,0,0.4);
    z-index: 2;
  }

  /* ── NOW PLAYING CHIP ─────────────────────────────────── */
  .sv-now-playing {
    position: absolute;
    top: 14px; left: 14px;
    background: rgba(10, 11, 15, 0.62);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(201,162,75,0.16);
    border-radius: 12px;
    padding: 8px 14px 8px 11px;
    display: flex;
    align-items: flex-start;
    gap: 9px;
    pointer-events: none;
    z-index: 10;
    max-width: calc(100% - 28px);
    transition: opacity 0.45s ease;
  }
  .sv-now-text-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  #sv-now-text {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sv-now-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.64rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    min-height: 12px;
  }
  .sv-now-hd {
    background: var(--gold-dim);
    color: var(--gold-soft);
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
  }
  .sv-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 8px var(--live-glow);
    animation: pulse 1.8s infinite;
    flex-shrink: 0;
    margin-top: 3px;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.45; transform: scale(1.25); }
  }

  /* ── LOADING / ERROR ──────────────────────────────────── */
  .sv-loading-overlay {
    position: absolute; inset: 0;
    background: rgba(6, 7, 10, 0.74);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    gap: 14px;
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.03em;
    z-index: 8;
    text-align: center;
    padding: 20px;
  }
  .sv-loading-overlay.active { display: flex; }
  .sv-spinner {
    width: 36px; height: 36px;
    border: 2.5px solid rgba(201,162,75,0.15);
    border-top-color: var(--gold-soft);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sv-error {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(6, 7, 10, 0.92);
    gap: 8px;
    font-size: 0.88rem;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
    z-index: 9;
  }
  .sv-error.active { display: flex; }
  .sv-error-icon {
    width: 44px; height: 44px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 6px;
    color: var(--faint);
  }
  .sv-error-icon svg { width: 20px; height: 20px; }
  .sv-error small { color: var(--muted); font-size: 0.78rem; }

  /* ── CUSTOM CONTROLS BAR ──────────────────────────────── */
  .sv-controls-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 30px 14px 14px;
    background: linear-gradient(180deg, transparent, rgba(6,7,10,0.72) 55%, rgba(6,7,10,0.86));
    transition: opacity 0.45s ease;
  }
  .sv-ctrl-btn {
    width: 34px; height: 34px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 9px;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
  }
  .sv-ctrl-btn:hover { background: rgba(201,162,75,0.2); border-color: var(--gold); transform: translateY(-1px); }
  .sv-ctrl-btn:active { transform: translateY(0); }
  .sv-ctrl-btn svg { width: 16px; height: 16px; fill: #fff; }

  .sv-volume-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sv-volume-slider {
    width: 76px;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.18);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .sv-volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 6px rgba(201,162,75,0.6);
    cursor: pointer;
    margin-top: -4px;
  }
  .sv-volume-slider::-moz-range-thumb {
    width: 11px; height: 11px;
    border: none;
    border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 6px rgba(201,162,75,0.6);
    cursor: pointer;
  }
  .sv-volume-slider::-webkit-slider-runnable-track { height: 3px; border-radius: 4px; }
  .sv-volume-slider::-moz-range-track { height: 3px; border-radius: 4px; background: rgba(255,255,255,0.18); }

  .sv-ctrl-spacer { flex: 1; }

  /* auto-hide chrome when idle, in both windowed and fullscreen */
  .sv-video-box.sv-idle .sv-controls-bar,
  .sv-video-box.sv-idle .sv-now-playing {
    opacity: 0;
    pointer-events: none;
  }
  .sv-video-box.sv-idle:hover .sv-controls-bar,
  .sv-video-box.sv-idle:hover .sv-now-playing {
    opacity: 1;
    pointer-events: auto;
  }
  .sv-video-box:fullscreen.sv-idle { cursor: none; }

  /* ── SIDEBAR / CHANNEL LIST ───────────────────────────── */
  .sv-sidebar {
    height: 100vh;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 20px 20px 20px 0;
    border-left: 1px solid var(--border-soft);
    background: rgba(16, 18, 25, 0.4);
  }
  .sv-sidebar-inner {
    padding-left: 18px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }
  .sv-sidebar-header {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--muted);
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sv-count {
    color: var(--faint);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .sv-search-wrap {
    position: relative;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .sv-search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    fill: none;
    stroke: var(--muted);
    stroke-width: 2;
    pointer-events: none;
  }
  .sv-search {
    width: 100%;
    background: rgba(18, 20, 29, 0.7);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px 10px 34px;
    color: var(--text);
    font-size: 0.85rem;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .sv-search:focus {
    border-color: var(--gold);
    background: var(--card-hover);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .sv-search::placeholder { color: var(--faint); }

  .sv-channel-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
  }
  .sv-channel-list::-webkit-scrollbar { width: 4px; }
  .sv-channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sv-channel-list::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  .sv-channel-list::-webkit-scrollbar-track { background: transparent; }

  @keyframes chFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sv-ch-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-md);
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: var(--sans);
    position: relative;
    animation: chFadeIn 0.4s ease backwards;
    animation-delay: calc(var(--i, 0) * 28ms);
  }
  .sv-ch-btn:hover {
    background: var(--card-hover);
    border-color: #313650;
    transform: translateX(2px);
  }
  .sv-ch-btn.active {
    background: linear-gradient(90deg, var(--gold-dim), rgba(201,162,75,0.03));
    border-color: rgba(201,162,75,0.45);
    box-shadow: 0 4px 18px -8px rgba(201,162,75,0.25);
  }
  .sv-ch-btn.active::before {
    content: '';
    position: absolute;
    left: -1px; top: 8px; bottom: 8px;
    width: 3px;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold));
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(201,162,75,0.55);
  }
  .sv-ch-logo {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    overflow: hidden;
    border: 1px solid var(--border-soft);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .sv-ch-btn.active .sv-ch-logo {
    border-color: rgba(201,162,75,0.5);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .sv-ch-logo img {
    width: 100%; height: 100%;
    object-fit: contain;
  }
  .sv-ch-info { flex: 1; min-width: 0; }
  .sv-ch-title {
    font-size: 0.84rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sv-ch-btn.active .sv-ch-title { color: var(--gold-soft); }
  .sv-ch-cat {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.01em;
  }
  .sv-ch-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--faint);
    flex-shrink: 0;
  }
  .sv-ch-btn.active .sv-ch-live {
    background: var(--live);
    box-shadow: 0 0 6px var(--live-glow);
  }

  .sv-empty {
    color: var(--faint);
    text-align: center;
    padding: 30px 10px;
    font-size: 0.85rem;
  }

  /* ── FULLSCREEN MODE ───────────────────────────────────── */
  .sv-video-box:fullscreen {
    border-radius: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sv-video-box:fullscreen video {
    max-height: 100vh;
  }
  .sv-video-box:-webkit-full-screen {
    border-radius: 0;
  }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 900px) {
    html, body { overflow: auto; }
    .sv-main {
      grid-template-columns: 1fr;
      height: auto;
      min-height: 100vh;
    }
    .sv-player-wrap {
      height: auto;
    }
    .sv-video-box {
      aspect-ratio: 16/9;
      flex: none;
    }
    .sv-sidebar {
      height: auto;
      border-left: none;
      border-top: 1px solid var(--border-soft);
      padding: 20px;
    }
    .sv-sidebar-inner {
      padding-left: 0;
    }
    .sv-channel-list {
      max-height: 400px;
      flex: none;
    }
  }

  @media (max-width: 500px) {
    .sv-player-wrap { padding: 12px; }
    .sv-brand-tagline { display: none; }
    .sv-sidebar { padding: 16px; }
    .sv-volume-slider { width: 52px; }
  }

  /* focus visibility for accessibility */
  button:focus-visible, input:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<!-- MAIN -->
<div class="sv-main">

  <!-- PLAYER -->
  <div class="sv-player-wrap">

    <div class="sv-brand-header">
      <div class="sv-brand-row">
        <span class="sv-brand-word">AUREL</span>
        <span class="sv-brand-tagline">— live channels</span>
      </div>
      <div class="sv-brand-shimmer"></div>
    </div>

    <div class="sv-video-box" id="sv-video-box">
      <video id="sv-video" playsinline webkit-playsinline x5-playsinline autoplay></video>
      <div class="sv-vignette"></div>

      <div class="sv-now-playing" id="sv-now-playing">
        <span class="sv-dot"></span>
        <div class="sv-now-text-group">
          <span id="sv-now-text">Select a channel</span>
          <span class="sv-now-sub" id="sv-now-sub"></span>
        </div>
      </div>

      <div class="sv-loading-overlay" id="sv-loading">
        <div class="sv-spinner"></div>
        <span id="sv-loading-text">Loading stream…</span>
      </div>

      <div class="sv-error" id="sv-error">
        <div class="sv-error-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
        </div>
        <div>Stream unavailable</div>
        <small>Check the URL or try another channel</small>
      </div>

      <div class="sv-controls-bar" id="sv-controls-bar">
        <button class="sv-ctrl-btn" id="sv-play-btn" title="Play / Pause (Space)" aria-label="Play or pause" onclick="togglePlay()">
          <svg id="sv-play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>

        <div class="sv-volume-group">
          <button class="sv-ctrl-btn" id="sv-mute-btn" title="Mute (M)" aria-label="Mute or unmute" onclick="toggleMute()">
            <svg id="sv-mute-icon" viewBox="0 0 24 24"><path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/><path d="M14 4.45v2.06c2.89.86 5 3.54 5 6.49s-2.11 5.63-5 6.49v2.06c4.01-.91 7-4.49 7-8.55s-2.99-7.64-7-8.55z"/></svg>
          </button>
          <input type="range" class="sv-volume-slider" id="sv-volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume">
        </div>

        <div class="sv-ctrl-spacer"></div>

        <button class="sv-ctrl-btn" id="sv-fs-btn" title="Fullscreen (F)" aria-label="Toggle fullscreen" onclick="toggleFullscreen()">
          <svg id="sv-fs-icon" viewBox="0 0 24 24"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <!-- SIDEBAR -->
  <div class="sv-sidebar">
    <div class="sv-sidebar-inner">
      <div class="sv-sidebar-header">
        <span>Channels</span>
        <span class="sv-count" id="sv-count"></span>
      </div>
      <div class="sv-search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input class="sv-search" type="text" placeholder="Search channels…" id="sv-search" oninput="filterChannels(this.value)">
      </div>
      <div class="sv-channel-list" id="sv-channel-list"></div>
    </div>
  </div>

</div>

<script>
  let CHANNELS = [];
  let hls = null;
  let activeIdx = -1;

  const video = document.getElementById('sv-video');
  const loadDiv = document.getElementById('sv-loading');
  const loadingText = document.getElementById('sv-loading-text');
  const errDiv = document.getElementById('sv-error');
  const nowText = document.getElementById('sv-now-text');
  const nowSub = document.getElementById('sv-now-sub');
  const countEl = document.getElementById('sv-count');

  function showLoading(on) {
    loadDiv.classList.toggle('active', on);
  }

  function showError(on) {
    errDiv.classList.toggle('active', on);
  }

  async function loadChannelsFromJson() {
    try {
      const response = await fetch('channels.json');

      if (!response.ok) {
        throw new Error('Failed to load channels');
      }

      CHANNELS = await response.json();

      renderChannels(CHANNELS);

      if (CHANNELS.length > 0) {
        loadChannel(0);
      }

    } catch (error) {
      console.error(error);
      document.getElementById('sv-channel-list').innerHTML =
        '<div class="sv-empty">Couldn\'t load the channel list.</div>';
    }
  }

  function loadChannel(idx) {

    const ch = CHANNELS[idx];
    if (!ch) return;

    activeIdx = idx;

    nowText.textContent = ch.name;
    nowSub.innerHTML = `${ch.category} <span class="sv-now-hd">HD</span>`;
    loadingText.textContent = `Loading ${ch.name}…`;
    document.title = `${ch.name} — Aurel Live`;

    document.querySelectorAll('.sv-ch-btn').forEach((btn) => {
      btn.classList.toggle('active', Number(btn.dataset.idx) === idx);
    });

    showLoading(true);
    showError(false);
    clearTimeout(idleTimer);
    videoBox.classList.remove('sv-idle');

    if (hls) {
      hls.destroy();
      hls = null;
    }

    video.src = '';

    if (Hls.isSupported()) {

      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true
      });

      hls.loadSource(ch.url);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        showLoading(false);
        video.play().catch(() => {});
      });

      hls.on(Hls.Events.ERROR, (_, data) => {

        if (data.fatal) {
          showLoading(false);
          showError(true);
        }

      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {

      video.src = ch.url;

      video.addEventListener(
        'loadedmetadata',
        () => {
          showLoading(false);
          video.play().catch(() => {});
        },
        { once: true }
      );

      video.addEventListener(
        'error',
        () => {
          showLoading(false);
          showError(true);
        },
        { once: true }
      );

    } else {

      showLoading(false);
      showError(true);

    }
  }

  function renderChannels(list) {

    const container = document.getElementById('sv-channel-list');

    container.innerHTML = '';
    countEl.textContent = CHANNELS.length ? `${list.length} / ${CHANNELS.length}` : '';

    if (list.length === 0) {
      container.innerHTML = '<div class="sv-empty">No channels match your search.</div>';
      return;
    }

    list.forEach((ch, i) => {

      const realIdx = CHANNELS.indexOf(ch);

      const btn = document.createElement('button');

      btn.className = 'sv-ch-btn' + (realIdx === activeIdx ? ' active' : '');
      btn.dataset.idx = realIdx;
      btn.style.setProperty('--i', i);

      const isImgUrl =
        ch.logo &&
        (ch.logo.startsWith('http') || ch.logo.startsWith('/'));

      const logoContent = isImgUrl
        ? `<img src="${ch.logo}" alt="${ch.name}" loading="lazy">`
        : (ch.logo || ch.name.charAt(0));

      btn.innerHTML = `
        <div class="sv-ch-logo">${logoContent}</div>

        <div class="sv-ch-info">
          <div class="sv-ch-title">${ch.name}</div>
          <div class="sv-ch-cat">${ch.category}</div>
        </div>

        <div class="sv-ch-live"></div>
      `;

      btn.addEventListener('click', () => {
        loadChannel(realIdx);
      });

      container.appendChild(btn);

    });
  }

  function filterChannels(query) {

    const q = query.toLowerCase().trim();

    const filtered = q
      ? CHANNELS.filter(
          c =>
            c.name.toLowerCase().includes(q) ||
            c.category.toLowerCase().includes(q)
        )
      : CHANNELS;

    renderChannels(filtered);
  }

  /* ── PLAY / MUTE CONTROLS ──────────────────────────────── */
  const playIcon = document.getElementById('sv-play-icon');
  const muteIcon = document.getElementById('sv-mute-icon');
  const volumeSlider = document.getElementById('sv-volume-slider');

  const ICON_PLAY  = '<path d="M8 5v14l11-7z"/>';
  const ICON_PAUSE = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  const ICON_SOUND = '<path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16.5 12c0-1.77-1-3.29-2.5-4.03v8.06c1.5-.74 2.5-2.26 2.5-4.03z"/><path d="M14 4.45v2.06c2.89.86 5 3.54 5 6.49s-2.11 5.63-5 6.49v2.06c4.01-.91 7-4.49 7-8.55s-2.99-7.64-7-8.55z"/>';
  const ICON_MUTED = '<path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M19 9l-4.5 4.5M14.5 9l4.5 4.5" stroke="#fff" stroke-width="1.7" stroke-linecap="round"/>';

  function togglePlay() {
    if (video.paused) {
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  }

  function toggleMute() {
    video.muted = !video.muted;
    if (!video.muted && video.volume === 0) {
      video.volume = 0.6;
      volumeSlider.value = 0.6;
    }
    updateMuteIcon();
  }

  function updateMuteIcon() {
    const silent = video.muted || video.volume === 0;
    muteIcon.innerHTML = silent ? ICON_MUTED : ICON_SOUND;
  }

  video.addEventListener('play', () => { playIcon.innerHTML = ICON_PAUSE; armIdle(); });
  video.addEventListener('pause', () => {
    playIcon.innerHTML = ICON_PLAY;
    clearTimeout(idleTimer);
    videoBox.classList.remove('sv-idle');
  });
  video.addEventListener('volumechange', updateMuteIcon);

  volumeSlider.addEventListener('input', () => {
    video.volume = Number(volumeSlider.value);
    video.muted = false;
    updateMuteIcon();
  });

  /* ── FULLSCREEN ─────────────────────────────────────────── */
  const videoBox = document.getElementById('sv-video-box');
  const fsIcon = document.getElementById('sv-fs-icon');

  const ICON_FS_ENTER =
    '<path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>';
  const ICON_FS_EXIT =
    '<path d="M5 16H3v5h5v-2H5v-3zm-2-8h2V5h3V3H3v5zm13 11h3v-3h2v-5h-5v5h-2v3zm3-11V5h-3V3h5v5h-2z"/>';

  function toggleFullscreen() {

    const el = videoBox;

    if (!document.fullscreenElement && !document.webkitFullscreenElement) {

      (el.requestFullscreen || el.webkitRequestFullscreen)?.call(el);

    } else {

      (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);

    }
  }

  function onFsChange() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsIcon.innerHTML = isFs ? ICON_FS_EXIT : ICON_FS_ENTER;
    armIdle();
  }

  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);

  /* ── IDLE / AUTO-HIDE CHROME ───────────────────────────── */
  let idleTimer = null;

  function armIdle() {
    clearTimeout(idleTimer);
    videoBox.classList.remove('sv-idle');
    if (!video.paused) {
      idleTimer = setTimeout(() => videoBox.classList.add('sv-idle'), 2800);
    }
  }

  videoBox.addEventListener('mousemove', armIdle);
  videoBox.addEventListener('touchstart', armIdle, { passive: true });

  document.addEventListener('keydown', e => {

    if (e.target.tagName === 'INPUT') return;

    const key = e.key.toLowerCase();

    if (key === 'f') {
      toggleFullscreen();
    } else if (key === 'm') {
      toggleMute();
    } else if (e.key === ' ') {
      e.preventDefault();
      togglePlay();
    }

  });

  /* Initialize */
  loadChannelsFromJson();
</script>
</body>
</html>
